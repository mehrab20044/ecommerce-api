name: Django Ecommerce CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    # 💥 حل مشکل: defaults باید دقیقاً در این لول (زیرمجموعه مستقیم جابِ test) تعریف شود
    defaults:
      run:
        working-directory: .

    services:
      postgres_db:
        image: postgres:latest
        env:
          POSTGRES_USER: mehrab_1383
          POSTGRES_PASSWORD: mehrab_2004
          POSTGRES_DB: mehrab
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mehrab_1383 -d mehrab"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Django Tests
      env:
        DJANGO_SETTINGS_MODULE: core.settings
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: mehrab_1383
        DB_PASSWORD: mehrab_2004
        DB_NAME: mehrab
      run: |
        python -m PYTHONPATH=$PYTHONPATH:$(pwd) python manage.py test
