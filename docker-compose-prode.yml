version: '3.8'

services:
  backend:
    build: .
    container_name: backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./core:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  smtp4dev:
    image: rnwood/smtp4dev:v3
    restart: on-failure
    ports:
      - "5000:80"
      - "2525:25"
      - "143:143"
      - "110:110"
    volumes:
      - smtp4dev-data:/smtp4dev
    environment:
      - ServerOptions__Urls=http://*:80
      - ServerOptions__HostName=smtp4dev

  # --- سرویس دیتابیس پورتگرس ---
  db:
    image: postgres:latest
    container_name: postgres_db
    environment:
      POSTGRES_USER: mehrab_1383
      POSTGRES_PASSWORD: mehrab_2004
      POSTGRES_DB: mehrab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mehrab_1383 -d mehrab"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- سرویس ابزار انتقال داده ---
  migration_tool:
    image: dimitri/pgloader:latest
    container_name: pgloader_migration
    volumes:
      - .:/data
    depends_on:
      db:
        condition: service_healthy
    command: pgloader /data/db.sqlite3 postgres://mehrab_1383:mehrab_2004@db:5432/mehrab

volumes:
  smtp4dev-data:
  postgres_data:
