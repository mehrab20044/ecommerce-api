services:
  db:
    image: postgres:18
    container_name: postgres_db
    environment:
      - POSTGRES_DB=shop_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=supersecretpassword
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - shop_network

  backend:
    build: .
    container_name: backend
    command: sh -c "python3 manage.py collectstatic --noinput && gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - ./core:/app
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - db
      - redis
    networks:
      - shop_network

  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/static:ro
      - media_volume:/app/media:ro
    depends_on:
      - backend
    networks:
      - shop_network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    networks:
      - shop_network
      
networks:
  shop_network:
    driver: bridge

volumes:
  postgres_data:
  static_volume:
  media_volume:
