version: '3.8'

services:
  db:
    image: postgres:18
    container_name: postgres_db
    environment:
      - POSTGRES_DB=shop_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=supersecretpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - db
volumes:
  postgres_data:
